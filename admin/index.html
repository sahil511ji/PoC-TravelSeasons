<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Seasons · PoC Admin</title>
<link rel="stylesheet" href="style.css">
<script src="vendor/sortable.min.js" defer></script>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <strong>Travel Seasons</strong>
    <span class="muted">· PoC Admin</span>
  </div>
  <nav class="tabs">
    <a href="#users" data-tab="users">Users</a>
    <a href="#trips" data-tab="trips" class="active">Trips</a>
    <a href="#videos" data-tab="videos">Videos</a>
  </nav>
  <div class="meta">
    <span id="health-pill" class="pill">…</span>
  </div>
</header>

<main id="root"></main>

<template id="tpl-users">
  <section class="page">
    <h1>Enrolled users</h1>
    <p class="muted">Add a user with a clear face selfie. Backend extracts a 512-dim face vector and stores it.</p>

    <form id="enroll-form" class="card form-row">
      <input name="name" placeholder="Full name" required />
      <input name="email" placeholder="Email (optional)" type="email" />
      <label class="file-input">
        <input type="file" name="selfie" accept="image/*" required />
        <span>Choose selfie…</span>
      </label>
      <button type="submit">Enroll</button>
    </form>

    <div id="users-grid" class="grid users-grid"></div>
  </section>
</template>

<template id="tpl-trips">
  <section class="page">
    <h1>Trips</h1>
    <form id="trip-form" class="card form-row">
      <input name="name" placeholder="Trip name (e.g. Bhutan May 2026)" required />
      <input name="start_date" type="date" />
      <input name="end_date" type="date" />
      <button type="submit">Create trip</button>
    </form>
    <div id="trips-list" class="trip-list"></div>
  </section>
</template>

<template id="tpl-trip-detail">
  <section class="page">
    <div class="crumbs"><a href="#trips">Trips</a> <span>›</span> <span id="td-crumb">Trip</span></div>
    <h1 id="td-name">Trip</h1>
    <div class="meta-row">
      <span id="td-dates" class="muted"></span>
      <span id="td-members" class="muted"></span>
    </div>

    <!-- SECTION 1: Days & itinerary -->
    <div class="section">
      <div class="section-header">
        <h2>1 · Days &amp; itinerary</h2>
        <button id="td-add-day-toggle" class="link">+ Add a day</button>
      </div>
      <p class="muted small">Trip days, parsed by AI from the Tour Manager's free-form day plan. Each day groups photos by activity using EXIF timestamps, and is the unit a recap video is built from.</p>

      <div id="days-list" style="margin-top:12px;"></div>

      <form id="day-form" class="card add-day-form" hidden>
        <label class="field">
          <span>Day date</span>
          <input name="date" type="date" required />
        </label>
        <label class="field">
          <span>Theme <span class="muted small">(optional, AI fills if blank)</span></span>
          <input name="theme" placeholder="e.g. Old & New Singapore" />
        </label>
        <label class="field">
          <span>Tour Manager <span class="muted small">(optional)</span></span>
          <input name="tour_manager" placeholder="e.g. Lakshmi" />
        </label>
        <label class="field">
          <span>Day plan (paste from TM)</span>
          <textarea name="raw_text" rows="7" placeholder="Paste the day's plan. Free-form is fine. Include rough times. Gemini will structure it."></textarea>
        </label>
        <div class="form-actions">
          <button type="button" id="day-form-cancel" class="ghost">Cancel</button>
          <button type="submit">Parse with AI</button>
        </div>
      </form>
    </div>

    <!-- SECTION 2: Photo upload -->
    <div class="section">
      <div class="section-header">
        <h2>2 · Trip photos</h2>
        <span class="muted small" id="photo-count"></span>
      </div>
      <p class="muted small">Bulk-upload group/candid photos taken during the trip. Backend reads EXIF time and slots each photo into the matching day's activity. Faces are also matched to enrolled users.</p>

      <div id="upload-zone" class="card upload-zone">
        <p><strong>Drop trip photos here</strong> or click to choose</p>
        <p class="muted small">Multiple files OK</p>
        <input type="file" id="upload-input" accept="image/*" multiple hidden />
      </div>

      <div id="progress" class="progress" hidden>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <span id="progress-text" class="muted small"></span>
      </div>

      <div class="filter-row" style="margin-top:14px;">
        <label>Filter:
          <select id="filter-select">
            <option value="all">All photos</option>
            <option value="group">Group photos (≥2 matched)</option>
            <option value="me">Photos of one user…</option>
          </select>
        </label>
        <select id="me-user" hidden></select>
      </div>

      <div id="selection-bar" class="selection-bar" hidden>
        <span id="selection-count">0 selected</span>
        <button id="selection-delete" onclick="bulkDeleteSelectedPhotos()" style="background:var(--red);">Delete selected</button>
        <button class="ghost" onclick="clearPhotoSelection()">Clear</button>
      </div>

      <div id="photos-grid" class="grid photos-grid"></div>
    </div>
  </section>
</template>

<template id="tpl-trip-day">
  <section class="page">
    <div class="crumbs">
      <a href="#trips">Trips</a> <span>›</span>
      <a href="#" id="tday-trip-crumb">Trip</a> <span>›</span>
      <span id="tday-day-crumb">Day</span>
    </div>
    <h1 id="tday-title">Day</h1>
    <div class="meta-row">
      <span id="tday-meta" class="muted"></span>
    </div>

    <!-- 1 · Itinerary -->
    <div class="section">
      <div class="section-header"><h2>1 · Itinerary</h2></div>
      <p class="muted small">Activities extracted by Gemini from the day plan. Importance scores drive how much each activity weighs in the recap video.</p>
      <table id="tday-items" class="data-table">
        <thead>
          <tr>
            <th>Time</th><th>Activity</th><th>Importance</th><th class="num">Photos</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 2 · Voiceover script -->
    <div class="section">
      <div class="section-header"><h2>2 · Voiceover script</h2></div>
      <p class="muted small">AI-generated. Edit it to taste before generating the video. Read the script aloud — it should sound like 30 seconds at gentle pace.</p>
      <textarea id="tday-script" rows="6" class="textarea-clean"></textarea>
      <div class="form-actions" style="margin-top:8px;">
        <span class="muted small" id="tday-script-status"></span>
        <button id="tday-save-script" class="ghost">Save script</button>
      </div>

      <div class="ai-edit-panel" style="margin-top:16px;padding:12px;border:1px dashed var(--border);border-radius:10px;background:#fafafa;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <strong style="font-size:14px;">Edit with AI</strong>
          <span class="muted small" id="tday-ai-target">—</span>
        </div>
        <p class="muted small" style="margin:0 0 8px;">Tell Gemini what to change — e.g. "talk about the palace first", "make it shorter", "more about the food". Duration scales with the number of selected photos.</p>
        <textarea id="tday-ai-instructions" rows="2" class="textarea-clean" placeholder="What should change?"></textarea>
        <div class="form-actions" style="margin-top:8px;">
          <span class="muted small" id="tday-ai-status"></span>
          <button id="tday-ai-apply" class="primary">Apply with AI</button>
        </div>
      </div>
    </div>

    <!-- 3 · Photos in recap -->
    <div class="section">
      <div class="section-header">
        <h2>3 · Photos in recap</h2>
        <div style="display:flex;gap:10px;align-items:center;">
          <span id="recap-photos-status" class="muted small"></span>
          <button id="recap-set-order" class="primary">✓ Set order</button>
        </div>
      </div>
      <p class="muted small">Drag the handle to reorder. After you're happy with the order, click <strong>Set order</strong> to save it. Checkbox / add / remove save automatically.</p>
      <div id="recap-photos-empty" class="muted" hidden>No photos for this day yet — upload them via the trip page.</div>
      <div id="recap-selected-wrap">
        <div class="recap-sub-header">
          <span><strong id="recap-selected-count">0</strong> in recap</span>
        </div>
        <div id="recap-selected-grid" class="photos-grid recap-grid"></div>
      </div>
      <div id="recap-unselected-wrap" hidden>
        <div class="recap-sub-header" style="margin-top:16px;">
          <span>Not in recap (<strong id="recap-unselected-count">0</strong>)</span>
          <button id="recap-add-all" class="ghost small">Add all →</button>
        </div>
        <div id="recap-unselected-grid" class="photos-grid recap-grid"></div>
      </div>
    </div>

    <!-- 4 · Recap video -->
    <div class="section">
      <div class="section-header">
        <h2>4 · Recap video</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <label class="muted small" style="display:flex;align-items:center;gap:6px;">
            Engine:
            <select id="tday-engine">
              <option value="remotion" selected>Remotion (high-quality)</option>
              <option value="shotstack">Shotstack</option>
            </select>
          </label>
          <button id="tday-generate-recap" class="primary">▶ Generate recap video</button>
        </div>
      </div>
      <p class="muted small">Pipeline: ElevenLabs voiceover → chosen engine renders MP4 → ready to review. Remotion ≈ 60s local; Shotstack ≈ 35s cloud.</p>
      <div id="tday-renders" style="margin-top:8px;">No renders yet.</div>
    </div>
  </section>
</template>

<template id="tpl-videos">
  <section class="page">
    <h1>Video reviews</h1>
    <p class="muted">All AI-generated recap videos across trips. Approve to publish to customers, reject to take down.</p>
    <div class="filter-row">
      <label>Show:
        <select id="videos-filter">
          <option value="all">All</option>
          <option value="pending_review" selected>Pending review</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="failed">Failed</option>
        </select>
      </label>
      <span class="muted small" id="videos-count"></span>
    </div>
    <div id="videos-list"></div>
  </section>
</template>

<div id="modal" class="modal" hidden>
  <div class="modal-card">
    <button class="modal-close" id="modal-close">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
